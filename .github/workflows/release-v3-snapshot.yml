name: Release v3 snapshot (1000 repos, sharded)

# One-shot, manually triggered. Produces an immutable scan snapshot of
# the curated ∪ experiment cohort against a frozen dataset, intended
# for the "scanning 1000 AI repos" v3 article. Outputs land in
# `data/releases/scores_v3_<size>_<date>.json` and are uploaded to a
# GitHub Release so the article can link an immutable URL.
#
# This workflow does NOT overwrite `data/scores.json` and is NOT on a
# schedule — it never races the daily scanner.
#
# Sharded execution: the work is split into N shards (default 4) that
# run in parallel via a matrix. Each shard runs `scan.py --shard k/N`
# against the dataset and uploads its partial envelope as an artefact.
# A `merge` job downloads all shards, runs `scripts/merge_shards.py`,
# validates the unified envelope against `schemas/scores.schema.json`,
# commits it, and (optionally) uploads to a GitHub Release.

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Frozen dataset path under data/releases/ (e.g. v3_1000_2026-05-01.json).'
        required: true
        default: 'v3_1000_2026-05-01.json'
      release_tag:
        description: 'Optional GitHub release tag to publish under (leave blank to skip release upload).'
        required: false
        default: ''
      shard_count:
        description: 'Number of parallel shards (default 4).'
        required: false
        default: '4'

# Distinct group from `daily-scan` — we explicitly *want* a manual
# release run to coexist with whatever the daily scan is doing.
# Inside a single release run the matrix shards still run in parallel.
concurrency:
  group: release-v3-snapshot
  cancel-in-progress: false

permissions:
  contents: write   # commit snapshot back + (optionally) create release

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      dataset: ${{ steps.resolve.outputs.dataset }}
      out: ${{ steps.resolve.outputs.out }}
      size: ${{ steps.resolve.outputs.size }}
      shard_count: ${{ steps.resolve.outputs.shard_count }}
      shard_matrix: ${{ steps.resolve.outputs.shard_matrix }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin to v5

      - name: Resolve frozen dataset + shard plan
        id: resolve
        run: |
          set -euo pipefail
          DS="data/releases/${{ inputs.dataset }}"
          if [ ! -f "$DS" ]; then
            echo "::error::Dataset not found: $DS"
            exit 1
          fi
          base="$(basename "$DS" .json)"
          out="data/releases/scores_${base}.json"
          # shard_count fence: clamp to [1, 16] so a typo can't fan
          # out 100 jobs and exhaust the parallel-job budget.
          shard_count_raw="${{ inputs.shard_count || '4' }}"
          if ! [[ "$shard_count_raw" =~ ^[0-9]+$ ]]; then
            echo "::error::shard_count must be a positive integer"
            exit 1
          fi
          shard_count=$(( shard_count_raw < 1 ? 1 : shard_count_raw ))
          shard_count=$(( shard_count > 16 ? 16 : shard_count ))
          # Build a JSON array '[1,2,...,N]' for the matrix.
          matrix_json=$(python -c "import json,sys; print(json.dumps(list(range(1, ${shard_count}+1))))")
          {
            echo "dataset=$DS"
            echo "out=$out"
            echo "size=$(python -c "import json,sys; print(len(json.load(open('$DS'))['repos']))")"
            echo "shard_count=$shard_count"
            echo "shard_matrix=$matrix_json"
          } >> "$GITHUB_OUTPUT"

  scan:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 90  # 250 repos / shard at ~30 s/repo ≤ 25 min
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.discover.outputs.shard_matrix) }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin to v5
        with:
          fetch-depth: 1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pin to v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install 'check-jsonschema>=0.30,<1'

      - name: Scan shard ${{ matrix.shard }}/${{ needs.discover.outputs.shard_count }}
        env:
          # Prefer the wider-scope AR_GITHUB_TOKEN (PAT). The default
          # GITHUB_TOKEN has a 5000/h shared quota across every job in
          # this repo, which gets exhausted quickly when 4 scan shards
          # run alongside daily-scan + PR CI + dependabot bumps. Falling
          # back to the default token keeps forks / public-fork runs
          # working when the secret is not configured.
          GITHUB_TOKEN: ${{ secrets.AR_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p _shards
          out="_shards/scores.shard${{ matrix.shard }}of${{ needs.discover.outputs.shard_count }}.json"
          python scripts/scan.py \
            --experiment-only \
            --experiment-json "${{ needs.discover.outputs.dataset }}" \
            --output         "$out" \
            --shard          "${{ matrix.shard }}/${{ needs.discover.outputs.shard_count }}" \
            --scan-health    ""

      - name: Upload shard artefact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # pin to v5
        with:
          name: shard-${{ matrix.shard }}-of-${{ needs.discover.outputs.shard_count }}
          path: _shards/scores.shard${{ matrix.shard }}of${{ needs.discover.outputs.shard_count }}.json
          retention-days: 7
          if-no-files-found: error

  merge:
    needs: [discover, scan]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # pin to v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # pin to v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install 'check-jsonschema>=0.30,<1' jsonschema

      - name: Download all shard artefacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # pin to v5
        with:
          path: _shards_in
          pattern: shard-*

      - name: Stage shard files
        run: |
          set -euo pipefail
          mkdir -p _shards
          # Each artefact lands in _shards_in/shard-K-of-N/scores.shardKofN.json;
          # flatten into _shards/.
          find _shards_in -type f -name '*.json' -print -exec cp {} _shards/ \;
          ls -la _shards

      - name: Merge shards into canonical envelope
        run: |
          set -euo pipefail
          python scripts/merge_shards.py \
            --shards _shards/scores.shard*.json \
            --output "${{ needs.discover.outputs.out }}" \
            --scan-health data/scan_health_v3.json

      - name: Validate merged snapshot against scores.schema.json
        run: |
          check-jsonschema --schemafile schemas/scores.schema.json \
            "${{ needs.discover.outputs.out }}"

      - name: Summarise snapshot
        run: |
          python3 - <<PY
          import json
          p = "${{ needs.discover.outputs.out }}"
          d = json.load(open(p))
          ok   = d.get("total_repos") or 0
          fail = len(d.get("failures") or [])
          print(f"snapshot={p}")
          print(f"scanned_ok={ok} failures={fail} dataset_size=${{ needs.discover.outputs.size }} shards=${{ needs.discover.outputs.shard_count }}")
          PY

      - name: Commit snapshot under data/releases/
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ needs.discover.outputs.out }}" data/scan_health_v3.json
          if git diff --staged --quiet; then
            echo "No snapshot changes."
            exit 0
          fi
          git commit -m "chore: v3 1000-repo snapshot ${{ inputs.dataset }} [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort || true; continue; }
            git push origin HEAD:main && exit 0
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push snapshot after 3 attempts."
          exit 1

      - name: Upload snapshot to GitHub Release (optional)
        if: inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --title "Agent-readiness v3 dataset $tag" \
              --notes "Frozen dataset + scan snapshot for the v3 article. Dataset: ${{ inputs.dataset }}." \
              "data/releases/${{ inputs.dataset }}#dataset-${{ inputs.dataset }}" \
              "${{ needs.discover.outputs.out }}#scores-${{ inputs.dataset }}"
          else
            gh release upload "$tag" \
              "data/releases/${{ inputs.dataset }}#dataset-${{ inputs.dataset }}" \
              "${{ needs.discover.outputs.out }}#scores-${{ inputs.dataset }}" \
              --clobber
          fi
