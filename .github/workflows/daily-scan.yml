name: Daily Agent Readiness Scan

# Daily live re-score of the 1000-repo cohort frozen in
# `data/releases/v3_1000_2026-05-01.json`. Output goes to
# `data/scores.json`, which is what the public leaderboard at
# https://harrydaihaolin.github.io/agent-readiness-leaderboard/ reads.
#
# Cohort vs. snapshot:
#   - Cohort definition  → data/releases/v3_*.json (immutable)
#   - Live daily scores  → data/scores.json        (this workflow)
#   - Frozen snapshot    → data/releases/scores_v3_*.json
#                          (release-v3-snapshot.yml, on demand,
#                          used by the v3 article for citation).
#
# Sharding: the work is split into N shards (default 4) that run in
# parallel via a matrix. Each shard runs `scan.py --shard k/N` and
# uploads its partial envelope as an artefact. The merge job
# downloads all shards, runs `scripts/merge_shards.py`, validates
# the unified envelope against `schemas/scores.schema.json`, and
# commits it to `data/scores.json`.

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Cohort dataset filename under data/releases/ (default v3_1000_2026-05-01.json).'
        required: false
        default: 'v3_1000_2026-05-01.json'
      shard_count:
        description: 'Number of parallel shards (default 4, max 16).'
        required: false
        default: '4'
  push:
    branches: [main]
    paths:
      - 'scripts/scan.py'
      - 'scripts/merge_shards.py'
      - '.github/workflows/daily-scan.yml'

# Two scheduled runs (or a manual `workflow_dispatch` racing the
# cron) both committing to `data/scores.json` would lose data —
# `concurrency:` serialises them.
concurrency:
  group: daily-scan
  cancel-in-progress: false

permissions:
  contents: write   # commit data/scores.json back to main

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      dataset: ${{ steps.resolve.outputs.dataset }}
      size: ${{ steps.resolve.outputs.size }}
      shard_count: ${{ steps.resolve.outputs.shard_count }}
      shard_matrix: ${{ steps.resolve.outputs.shard_matrix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin to v4

      - name: Resolve cohort + shard plan
        id: resolve
        run: |
          set -euo pipefail
          # Cohort dataset is pinned via the `dataset` input (defaults
          # to v3_1000_2026-05-01.json on the cron schedule). Bumping
          # to a new cohort is therefore a one-line workflow edit, not
          # an opaque file-listing heuristic — important because mixing
          # cohorts day-over-day would silently break the comparability
          # the public leaderboard depends on.
          name="${{ inputs.dataset || 'v3_1000_2026-05-01.json' }}"
          DS="data/releases/$name"
          if [ ! -f "$DS" ]; then
            echo "::error::Cohort dataset not found: $DS"
            exit 1
          fi
          # Clamp shard_count to [1, 16].
          shard_count_raw="${{ inputs.shard_count || '4' }}"
          if ! [[ "$shard_count_raw" =~ ^[0-9]+$ ]]; then
            echo "::error::shard_count must be a positive integer"
            exit 1
          fi
          shard_count=$(( shard_count_raw < 1 ? 1 : shard_count_raw ))
          shard_count=$(( shard_count > 16 ? 16 : shard_count ))
          matrix_json=$(python -c "import json; print(json.dumps(list(range(1, ${shard_count}+1))))")
          {
            echo "dataset=$DS"
            echo "size=$(python -c "import json; print(len(json.load(open('$DS'))['repos']))")"
            echo "shard_count=$shard_count"
            echo "shard_matrix=$matrix_json"
          } >> "$GITHUB_OUTPUT"
          echo "Cohort: $DS (shards=$shard_count)"

  scan:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.discover.outputs.shard_matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin to v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # pin to v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install 'check-jsonschema>=0.30,<1'

      - name: Scan shard ${{ matrix.shard }}/${{ needs.discover.outputs.shard_count }}
        env:
          # Same rationale as in release-v3-snapshot.yml: AR_GITHUB_TOKEN
          # (PAT) has its own quota, away from the 5000/h shared by all
          # workflow runs in this repo.
          GITHUB_TOKEN: ${{ secrets.AR_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p _shards
          out="_shards/scores.shard${{ matrix.shard }}of${{ needs.discover.outputs.shard_count }}.json"
          python scripts/scan.py \
            --experiment-only \
            --experiment-json "${{ needs.discover.outputs.dataset }}" \
            --output         "$out" \
            --shard          "${{ matrix.shard }}/${{ needs.discover.outputs.shard_count }}" \
            --scan-health    ""

      - name: Upload shard artefact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # pin to v4
        with:
          name: shard-${{ matrix.shard }}-of-${{ needs.discover.outputs.shard_count }}
          path: _shards/scores.shard${{ matrix.shard }}of${{ needs.discover.outputs.shard_count }}.json
          retention-days: 3
          if-no-files-found: error

  merge:
    needs: [discover, scan]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # pin to v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # pin to v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install 'check-jsonschema>=0.30,<1' jsonschema

      - name: Download all shard artefacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # pin to v4
        with:
          path: _shards_in
          pattern: shard-*

      - name: Stage shard files
        run: |
          set -euo pipefail
          mkdir -p _shards
          find _shards_in -type f -name '*.json' -print -exec cp {} _shards/ \;
          ls -la _shards

      - name: Merge shards into data/scores.json
        run: |
          set -euo pipefail
          python scripts/merge_shards.py \
            --shards _shards/scores.shard*.json \
            --output data/scores.json \
            --scan-health data/scan_health.json

      - name: Validate merged scores against scores.schema.json
        # ML1: every consumer (analytics, dashboard, landing-page,
        # insights RAG, research judge) pins this schema. Validating
        # here means a producer-side envelope drift reds the daily
        # scan instead of breaking each consumer one at a time.
        run: |
          check-jsonschema --schemafile schemas/scores.schema.json data/scores.json

      - name: Fail on excessive scan failures
        # ML3: if more than 10% of cohort fails in a single run,
        # something is structurally wrong (rate limiting, network,
        # scanner regression). Fail loud rather than silently shrink
        # the `total_repos` denominator that downstream consumers and
        # marketing copy quote.
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, sys
          with open("data/scores.json") as fh:
              doc = json.load(fh)
          ok   = doc.get("total_repos") or 0
          fail = len(doc.get("failures") or [])
          total = ok + fail
          if total == 0:
              sys.exit(0)
          ratio = fail / total
          print(f"data/scores.json: ok={ok} fail={fail} ratio={ratio:.2%}")
          if ratio > 0.10:
              print(f"::error::failure ratio {ratio:.2%} > 10%")
              sys.exit(1)
          PY

      - name: Commit data/scores.json
        # ML2: rebase before push and retry up to 3 times. Without
        # this, any in-flight commit on `main` (e.g. a docs PR
        # merge) breaks the push and leaves the freshly scanned data
        # sitting in the workflow log only.
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.json data/scan_health.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No score changes to commit."
            exit 0
          fi
          git commit -m "chore: refresh data/scores.json from v3 cohort [skip ci]"
          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin HEAD:main; then
                echo "Pushed on attempt $attempt."
                exit 0
              fi
            else
              git rebase --abort || true
            fi
            echo "Push attempt $attempt failed; retrying after backoff..."
            sleep $((attempt * 5))
          done
          echo "::error::Failed to push after 3 attempts; data not committed."
          exit 1
