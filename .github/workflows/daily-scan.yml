name: Daily Agent Readiness Scan

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC every day
  workflow_dispatch:        # allow manual runs from the Actions tab
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/daily-scan.yml'

permissions:
  contents: write   # needed to commit data/scores.json back to main

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Discover daily experiment pool (GitHub search)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/discover_repos.py

      - name: Scan curated leaderboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/scan.py -o data/scores.json

      - name: Scan experiment pool (up to 100 repos)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/scan.py --experiment-only -o data/scores_experiment.json

      - name: Commit scores + experiment metadata
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.json data/scores_experiment.json data/experiment_repos.json
          git diff --staged --quiet || \
            git commit -m "chore: update scores + daily experiment pool [skip ci]"
          git push
