# Phase C8 dogfood workflow: every repo runs the agent-readiness scanner
# against itself on every PR. The scanner gates merges on a minimum score
# (--fail-below 90), pins the single highest-priority structured fix,
# applies it, and verifies the action's verify command passes.
#
# When the apply step fails verify, the workflow exits 1 and the PR is
# blocked until the maintainer either:
#   - lowers --fail-below for repos that legitimately can't reach 90 yet, or
#   - merges the auto-generated fix.
#
# This file is templated; copies live at <repo>/.github/workflows/dogfood.yml.
# Keep this template in sync with each copy when the contract changes.

name: dogfood

on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}
  push:
    branches: [main]

jobs:
  agent-readiness-self-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: "3.12"

      - name: Install agent-readiness
        run: |
          python -m pip install --upgrade pip
          # Keep this range in sync with requirements.txt. Latest published
          # wheel is 2.1.1; the upper bound guards against a 3.0 surprise.
          pip install "agent-readiness>=2.1,<3"

      - name: Self-scan
        # --fail-below 90: gate merges on a minimum readiness score.
        # The apply/verify pair (--apply-top-action / --verify) is wired
        # back in when the next agent-readiness release ships them; the
        # 2.1.x line in PyPI doesn't expose those flags yet, and using
        # them red-lined every PR.
        run: |
          agent-readiness scan . \
            --fail-below 90 \
            --no-progress

      - name: Show diff (when apply changed anything)
        if: always()
        run: |
          if ! git diff --quiet; then
            echo "::group::agent-readiness applied a fix"
            git --no-pager diff
            echo "::endgroup::"
          else
            echo "agent-readiness applied no changes."
          fi
