name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin to v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # pin to v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Byte-compile scripts
        run: python -m py_compile scripts/*.py
      - name: Lint scripts (ruff)
        run: |
          pip install ruff
          ruff check scripts/
      - name: Protocol constants drift check
        # Regenerate scripts/_protocol_constants.py from the installed
        # protocol wheel (transitively pulled in by agent-readiness in
        # requirements.txt) and fail if the result differs from what's
        # committed.
        run: |
          python scripts/regen_protocol_constants.py
          git diff --exit-code -- scripts/_protocol_constants.py
      # Belt-and-braces: contributors are expected to install local
      # pre-commit hooks; this step makes CI fail loudly the same way
      # if they didn't, so a missed `pre-commit install` doesn't sneak
      # ruff/yaml/etc. errors past review.
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run all pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

  self-scan:
    runs-on: ubuntu-latest
    needs: lint-and-compile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin to v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # pin to v5
        with:
          python-version: '3.12'
          cache: 'pip'
      # Pin to a major range so a PyPI release can't red CI overnight.
      - run: pip install 'agent-readiness>=1.1,<2'
      # Realistic floor for a data repo: typecheck / devcontainer /
      # entry_points etc. don't really apply here, so the scanner
      # reports ~65. Floor is the rounded-down current score minus a
      # safety margin; bump it as the repo earns it back. (Prior 90
      # threshold reflected a more lenient scanner pre-1.1.0.)
      - run: agent-readiness scan . --fail-below 60
